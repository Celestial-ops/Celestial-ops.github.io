<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MDC MODDING | MASTER CONSOLE v1.0</title>
    <style>
        :root { --mdc: #00ff88; --warn: #ff3e3e; --gold: #ffd700; --bg: #050505; }
        body { 
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0;
            background-image: linear-gradient(rgba(0,0,0,0.92), rgba(0,0,0,0.92)), url('https://placehold.co/600x400/000000/00ff88?text=MDC+NETWORK+CONNECTED');
            background-attachment: fixed;
        }
        .header { background: #000; padding: 15px; border-bottom: 2px solid var(--mdc); position: sticky; top:0; z-index:100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
        input { background: #151515; border: 1px solid #333; color: var(--mdc); padding: 12px; border-radius: 8px; flex: 1; font-size: 0.8rem; outline: none; }
        .session-info { font-size: 0.7rem; color: #888; text-transform: uppercase; display: flex; justify-content: space-between; padding: 0 5px; }
        
        /* Main Controls */
        .admin-box { padding: 15px; }
        .big-btn { width: 100%; padding: 16px; border-radius: 10px; border: none; font-weight: 900; margin-bottom: 10px; cursor: pointer; text-transform: uppercase; }
        .money { background: linear-gradient(to right, var(--gold), #8a6d00); color: black; }
        .crash { background: linear-gradient(to right, var(--warn), #800000); color: white; }

        /* Grids */
        .section-label { font-size: 0.75rem; color: var(--mdc); padding: 10px 15px; font-weight: bold; border-left: 3px solid var(--mdc); margin: 10px 0; background: rgba(0,255,136,0.05); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 8px; padding: 10px; }
        .item-btn { background: #111; border: 1px solid #222; padding: 12px 5px; border-radius: 6px; color: #eee; font-size: 0.65rem; cursor: pointer; transition: 0.1s; }
        .item-btn:active { background: var(--mdc); color: black; border-color: white; }
        .item-btn span { color: #555; font-size: 0.55rem; display: block; margin-bottom: 3px; }

        #search { width: 92%; margin: 0 4% 15px; border-radius: 20px; border: 1px solid #333; }
        .watermark { text-align: center; color: #333; font-size: 0.6rem; padding: 20px; letter-spacing: 5px; }
    </style>
</head>
<body>

<div class="header">
    <div class="input-row">
        <input type="text" id="metaID" placeholder="Meta @-ID">
        <input type="password" id="token" placeholder="Refresh Token" oninput="sync()">
    </div>
    <div class="session-info">
        <span>STATUS: <b id="stat">OFFLINE</b></span>
        <span>ROOM: <b id="room">WAITING...</b></span>
    </div>
</div>

<div class="admin-box">
    <button class="big-btn money" onclick="cmd('MONEY', '9999999')">💸 Give All Players $9.9M</button>
    <button class="big-btn crash" onclick="ghostLag()">⚠️ GHOST LAG / CRASH ROOM</button>
</div>

<div class="section-label">TELEPORT PRESETS (MAP NODES)</div>
<div class="grid" id="tpGrid"></div>

<div class="section-label">PREFAB SPAWNER (46 ITEMS)</div>
<input type="text" id="search" placeholder="Search Data..." onkeyup="filter()">
<div class="grid" id="itemGrid"></div>

<div class="watermark">MDC MODDING SYSTEM</div>

<script>
    // COORDINATE DATABASE: [X, Y, Z]
    const locations = {
        "Arena Map": [102.4, 5.0, -44.2], "Caves": [-15.2, -40.1, 88.5], 
        "Circus": [210.0, 12.5, 305.1], "Dam Map": [45.8, 150.2, -12.4],
        "Forest": [-330.5, 22.1, 110.8], "Graveyard": [88.2, 4.4, -210.3],
        "Hell": [0.0, -666.0, 0.0], "Lobby": [1.2, 0.5, 1.2],
        "Mountains": [140.2, 505.0, -90.4], "Mimic Pipe": [-44.1, 12.0, 33.9],
        "Armstrong Cave": [512.4, -30.5, 11.2], "Chicken Nest": [12.8, 4.0, 402.1],
        "Creator Studio": [0.0, 10.0, 0.0], "Dark Forest": [-502.1, 15.0, 220.4],
        "Foundation": [25.5, -100.2, 45.1], "Haunted Mansion": [112.9, 15.4, -15.2],
        "Lake": [305.5, -2.1, 88.4], "Megalodon Cave": [-88.4, -205.1, 312.4],
        "Mines": [44.2, -50.1, -112.5], "Office": [15.2, 2.0, 15.2]
    };

    const prefabs = [
        {h:"0x000347aa", n:"item_goldcoin"}, {h:"0x000347b8", n:"item_dynamite"}, {h:"0x000347c6", n:"item_grenade"},
        {h:"0x000347d3", n:"item_cluster_grenade"}, {h:"0x000347e8", n:"item_pumpkin_bomb"}, {h:"0x000347fa", n:"item_landmine"},
        {h:"0x00034808", n:"item_sticky_dynamite"}, {h:"0x0003481d", n:"item_flashbang"}, {h:"0x0003482c", n:"item_broccoli_grenade"},
        {h:"0x00034842", n:"item_tripwire_explosive"}, {h:"0x0003485a", n:"item_rpg_ammo_spear"}, {h:"0x0003486e", n:"item_dynamite_cube"},
        {h:"0x00034881", n:"item_anti_gravity_grenade"}, {h:"0x0003489b", n:"item_impulse_grenade"}, {h:"0x000348b0", n:"item_tele_grenade"},
        {h:"0x000348c2", n:"item_broccoli_shrink_grenade"}, {h:"0x000348df", n:"item_flamethrower_skull"}, {h:"0x000348f7", n:"item_rpg_cny"},
        {h:"0x00034904", n:"item_rpg_easter"}, {h:"0x00034914", n:"item_rpg_smshr"}, {h:"0x00034923", n:"item_rpg_spear"},
        {h:"0x00034932", n:"item_grenade_gold"}, {h:"0x00034944", n:"item_radiation_gun"}, {h:"0x00034957", n:"item_pumpkinjack"},
        {h:"0x000345ed", n:"item_grenade_launcher"}, {h:"0x00034603", n:"item_flamethrower_skull_ruby"}, {h:"0x00034620", n:"item_hookshot_sword"},
        {h:"0x00034634", n:"item_shield_viking_4"}, {h:"0x00034649", n:"item_teleport_gun"}, {h:"0x0003465b", n:"item_hoverpad"},
        {h:"0x00034669", n:"item_backpack_mega"}, {h:"0x0003467c", n:"item_flashlight_mega"}, {h:"0x00034691", n:"item_ogre_hands"},
        {h:"0x000346a1", n:"item_revolver_gold"}, {h:"0x000346b4", n:"item_stellarsword_gold"}, {h:"0x000346cb", n:"item_bloodlust_vial"},
        {h:"0x00034564", n:"item_flaregun"}, {h:"0x00034572", n:"item_shotgun_ammo"}, {h:"0x00034584", n:"item_revolver_ammo"},
        {h:"0x00034597", n:"item_rpg_ammo_egg"}, {h:"0x00034492", n:"item_shredder"}, {h:"0x000344a0", n:"item_rare_card"},
        {h:"0x000344af", n:"item_pumpkin_pie"}, {h: "0x000344c0", n:"item_timebomb"}, {h: "0x000344ce", n:"item_backpack"}, {h: "0x000344dc", n:"item_hh_key"}
    ];

    function sync() {
        const t = document.getElementById('token').value;
        if(t.length > 20) {
            document.getElementById('stat').innerText = "LINKED";
            document.getElementById('stat').style.color = "#00ff88";
            document.getElementById('room').innerText = "AC-" + Math.random().toString(36).substr(2,4).toUpperCase();
        }
    }

    function tp(name) {
        const coords = locations[name];
        alert(`🌀 TELEPORTING\nDest: ${name}\nCoords: ${coords.join(', ')}`);
        console.log(`[MDC] Sent NetworkMove to Vector3(${coords[0]}, ${coords[1]}, ${coords[2]})`);
    }

    function cmd(type, val) {
        alert(`[MDC] Command ${type} sent: ${val}`);
    }

    function ghostLag() {
        alert("⚠️ CRASHING ROOM...\nFlooding Server Buffer (Ghost Packets)");
        for(let i=0; i<500; i++) { console.log("Packet Overflow: " + i); }
        alert("STATUS: SERVER TIMEOUT");
    }

    // Render Components
    document.getElementById('tpGrid').innerHTML = Object.keys(locations).map(l => `<button class="item-btn" onclick="tp('${l}')">${l}</button>`).join('');
    
    function draw(data) {
        document.getElementById('itemGrid').innerHTML = data.map(i => `
            <button class="item-btn" onclick="cmd('SPAWN', '${i.n}')">
                <span>${i.h}</span>${i.n.replace('item_','').toUpperCase()}
            </button>`).join('');
    }
    draw(prefabs);

    function filter() {
        const q = document.getElementById('search').value.toLowerCase();
        draw(prefabs.filter(p => p.n.includes(q)));
    }
</script>
</body>
</html>
