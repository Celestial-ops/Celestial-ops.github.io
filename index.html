<!DOCTYPE html>
<html>
<head>
    <title>Speed Draw Moderator</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; padding: 40px; text-align: center; }
        #preview { max-width: 300px; margin: 20px; border: 2px solid #333; }
        textarea { width: 100%; height: 100px; background: #000; color: #0f0; margin-top: 20px; }
        button { padding: 15px 30px; background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Roblox Auto-Draw Moderator</h1>
    <input type="text" id="url" placeholder="Paste Pinterest/Image URL" style="width: 300px; padding: 10px;">
    <button onclick="processImage()">1. PREVIEW & APPROVE</button>
    
    <div id="status"></div>
    <canvas id="canvas" style="display:none;"></canvas>
    
    <div id="approveArea" style="display:none;">
        <h3>Image Processed!</h3>
        <p>Copy the code below and paste it into the Roblox UI:</p>
        <textarea id="output" readonly onclick="this.select()"></textarea>
    </div>

    <script>
        async function processImage() {
            const url = document.getElementById('url').value;
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            
            img.crossOrigin = "Anonymous";
            img.src = "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);

            img.onload = function() {
                canvas.width = 100;
                canvas.height = 100;
                ctx.drawImage(img, 0, 0, 100, 100);
                
                const imageData = ctx.getImageData(0, 0, 100, 100).data;
                let pixels = [];

                for (let y = 0; y < 100; y++) {
                    for (let x = 0; x < 100; x++) {
                        const i = (y * 100 + x) * 4;
                        const r = imageData[i];
                        const g = imageData[i+1];
                        const b = imageData[i+2];

                        if (r < 250 || g < 250 || b < 250) {
                            pixels.push(`${x},${y},${r},${g},${b}`);
                        }
                    }
                }
                
                document.getElementById('output').value = pixels.join("|");
                document.getElementById('approveArea').style.display = 'block';
            };
        }
    </script>
</body>
</html>
