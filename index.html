<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NUT-CORP | II INTERFACE</title>
    <style>
        :root { --ii-green: #00ff41; --ii-red: #ff3333; --bg: #0a0a0a; }
        body { background: var(--bg); color: var(--ii-green); font-family: 'Courier New', monospace; padding: 10px; font-size: 13px; }
        .window { border: 1px solid var(--ii-green); height: 95vh; display: flex; flex-direction: column; }
        .top-bar { padding: 5px 10px; border-bottom: 1px solid var(--ii-green); display: flex; justify-content: space-between; background: #111; }
        
        .main-content { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebar - Lobby List */
        .sidebar { width: 200px; border-right: 1px solid var(--ii-green); padding: 10px; overflow-y: auto; }
        .player-item { padding: 5px; border: 1px solid #222; margin-bottom: 5px; cursor: pointer; transition: 0.2s; }
        .player-item:hover { background: rgba(0, 255, 65, 0.1); border-color: var(--ii-green); }
        .player-item.selected { background: var(--ii-green); color: black; }

        /* Control Panel */
        .controls { flex: 1; padding: 15px; display: flex; flex-direction: column; gap: 20px; }
        .section { border: 1px solid #333; padding: 10px; position: relative; }
        .section-label { position: absolute; top: -10px; left: 10px; background: var(--bg); padding: 0 5px; font-size: 10px; color: #888; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        button { background: transparent; border: 1px solid var(--ii-green); color: var(--ii-green); padding: 8px; cursor: pointer; text-transform: uppercase; font-family: inherit; }
        button:hover { background: var(--ii-green); color: black; }
        button.danger:hover { background: var(--ii-red); border-color: var(--ii-red); }

        .log { height: 80px; background: #000; border: 1px solid #222; padding: 5px; font-size: 11px; overflow-y: scroll; color: #008f11; }
    </style>
</head>
<body>

<div class="window">
    <div class="top-bar">
        <span>II_NUT_CORP_REMOTE_v3.0_APK</span>
        <span id="hmd-link">HMD: SEARCHING...</span>
    </div>

    <div class="main-content">
        <div class="sidebar">
            <div style="font-size: 10px; margin-bottom: 10px;">[LOBBY_USERS_DETECTED]</div>
            <div id="player-list">
                </div>
        </div>

        <div class="controls">
            <div class="section">
                <span class="section-label">TARGET_MANIPULATION</span>
                <div id="target-name">SELECTED: NONE</div>
                <div class="btn-group">
                    <button class="danger" onclick="execute('CRASH')">CRASH TARGET</button>
                    <button class="danger" onclick="execute('KICK')">KICK FROM LOBBY</button>
                    <button onclick="execute('FLING')">FLING PLAYER</button>
                    <button onclick="execute('FREEZE')">FREEZE MOVEMENT</button>
                </div>
            </div>

            <div class="section">
                <span class="section-label">PREFAB_SPAWNER_V2</span>
                <div class="btn-group">
                    <button onclick="spawn('MONSTER_OGRE')">SPAWN OGRE</button>
                    <button onclick="spawn('ITEM_CAMERA_HD')">SPAWN HD CAM</button>
                    <button onclick="spawn('PROP_EXPLOSIVE')">SPAWN TNT</button>
                    <button onclick="spawn('TRAP_BEAR')">SPAWN TRAP</button>
                </div>
            </div>

            <div class="log" id="log">
                > INITIALIZING API SNIFFER...<br>
                > ACCESSING HEADSET BUS...<br>
            </div>
        </div>
    </div>
</div>

<script>
    const players = ["User_992", "QuestGuy_01", "NutCatcher", "ViperVR", "LobbyHost_X"];
    let selectedPlayer = null;

    // Simulate "Sniffing" the Lobby
    function loadPlayers() {
        const list = document.getElementById('player-list');
        players.forEach(p => {
            const div = document.createElement('div');
            div.className = 'player-item';
            div.innerText = p;
            div.onclick = () => selectPlayer(p, div);
            list.appendChild(div);
        });
    }

    function selectPlayer(name, element) {
        selectedPlayer = name;
        document.querySelectorAll('.player-item').forEach(el => el.classList.remove('selected'));
        element.classList.add('selected');
        document.getElementById('target-name').innerText = `SELECTED: ${name}`;
        addLog(`TARGET CHANGED TO: ${name}`);
    }

    function execute(action) {
        if (!selectedPlayer) return alert("SELECT A PLAYER FIRST");
        addLog(`EXECUTING ${action} ON ${selectedPlayer}...`);
        if(action === 'CRASH' || action === 'KICK') {
            addLog(`SUCCESS: ${selectedPlayer} DISCONNECTED.`);
        }
    }

    function spawn(prefab) {
        const target = selectedPlayer ? selectedPlayer : "SELF";
        addLog(`SPAWNING ${prefab} AT ${target}`);
    }

    function addLog(msg) {
        const log = document.getElementById('log');
        log.innerHTML += `> ${msg}<br>`;
        log.scrollTop = log.scrollHeight;
    }

    // Simulate Headset Link
    setTimeout(() => {
        document.getElementById('hmd-link').innerText = "HMD: LINKED (QUEST 3)";
        document.getElementById('hmd-link').style.color = "var(--ii-green)";
        loadPlayers();
        addLog("API SNIFF COMPLETE: LOBBY DATA ACQUIRED.");
    }, 2500);
</script>

</body>
</html>
