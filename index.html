<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Company FUCKED BY LINUX</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <header>
            <div class="logo">AC</div>
            <h1>Animal Company <span>Tracker</span></h1>
        </header>

        <div class="search-box">
            <input type="text" id="username" placeholder="Target Username..." autocomplete="off">
            <button onclick="trackPlayer()">
                <span class="btn-text">LOCATE</span>
                <div class="loader" id="loader"></div>
            </button>
        </div>

        <div id="result" class="card">
            <div class="card-header">
                <span id="status-dot"></span>
                <h3 id="status-text">READY</h3>
            </div>
            <div class="card-body">
                <p class="label">CURRENT LOBBY CODE</p>
                <h2 id="lobbyCode">----</h2>
            </div>
        </div>

        <div class="footer-info">
            <p>Direct API Uplink Active</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
