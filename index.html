<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Company Player Tracker</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #2a2a2a; padding: 2rem; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); width: 350px; text-align: center; }
        input { width: 80%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 5px; font-weight: bold; }
        button:hover { background: #45a049; }
        #result { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; background: #333; }
        .online { color: #4CAF50; font-weight: bold; }
        .offline { color: #f44336; }
    </style>
</head>
<body>

<div class="container">
    <h2>Player Tracker</h2>
    <p>Animal Company</p>
    <input type="text" id="username" placeholder="Enter Username...">
    <button onclick="trackPlayer()">Locate Player</button>

    <div id="result">
        <div id="status"></div>
        <div id="lobbyCode" style="margin-top: 10px; font-size: 1.2em; letter-spacing: 2px; color: #ffeb3b;"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
