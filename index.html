<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NUT-CORP | II INTERFACE v4.0</title>
    <style>
        :root { --ii-green: #00ff41; --ii-red: #ff3333; --bg: #050505; }
        body { background: var(--bg); color: var(--ii-green); font-family: 'Courier New', monospace; margin: 0; padding: 15px; overflow: hidden; }
        .setup-screen { position: absolute; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 3px solid var(--ii-green); }
        .window { display: none; height: 90vh; border: 1px solid var(--ii-green); flex-direction: column; }
        
        input { background: #000; border: 1px solid var(--ii-green); color: var(--ii-green); padding: 10px; text-align: center; font-size: 1.5rem; margin-bottom: 20px; }
        .panel { display: flex; flex: 1; overflow: hidden; border-top: 1px solid var(--ii-green); }
        .sidebar { width: 220px; border-right: 1px solid var(--ii-green); padding: 10px; background: #0a0a0a; }
        .controls { flex: 1; padding: 15px; }
        
        .player-entry { padding: 8px; border: 1px solid #1a1a1a; margin-bottom: 5px; cursor: pointer; display: flex; justify-content: space-between; }
        .player-entry:hover { border-color: var(--ii-green); background: rgba(0,255,65,0.05); }
        .player-entry.active { background: var(--ii-green); color: black; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: transparent; border: 1px solid var(--ii-green); color: var(--ii-green); padding: 10px; cursor: pointer; text-transform: uppercase; }
        button:hover { background: var(--ii-green); color: black; }
        .log { background: #000; height: 100px; padding: 10px; font-size: 11px; margin-top: 20px; border: 1px solid #222; overflow-y: scroll; }
    </style>
</head>
<body>

<div id="setup" class="setup-screen">
    <h1 style="letter-spacing: 5px;">HMD LINK REQUIRED</h1>
    <p>ENTER THE 6-DIGIT CODE FROM YOUR QUEST HEADSET</p>
    <input type="text" id="pairingCode" placeholder="000000" maxlength="6">
    <button onclick="startHandshake()" style="width: 200px;">ESTABLISH LINK</button>
    <div id="link-msg" style="margin-top: 20px; font-size: 12px;">STATUS: WAITING...</div>
</div>

<div id="main" class="window">
    <div style="padding: 10px; background: #111; display: flex; justify-content: space-between;">
        <span>NUT-CORP // II_INTERFACE_EXECUTOR</span>
        <span style="color: yellow;">[LINKED: OCULUS_SDK_V74]</span>
    </div>

    <div class="panel">
        <div class="sidebar">
            <div style="font-size: 10px; color: #888; margin-bottom: 10px;">LIVE_LOBBY_SNIFFER</div>
            <div id="player-list"></div>
        </div>

        <div class="controls">
            <h2 id="target-label">TARGET: NONE</h2>
            <div class="btn-grid">
                <button onclick="cmd('CRASH')">CRASH TARGET</button>
                <button onclick="cmd('KICK')">KICK FROM LOBBY</button>
                <button onclick="cmd('FLING')">FLING VECTOR</button>
                <button onclick="cmd('FREEZE')">FREEZE POS</button>
            </div>
            
            <h3 style="margin-top:20px;">PREFAB_SPAWNER</h3>
            <div class="btn-grid">
                <button onclick="spawn('MONSTER_WATCHER')">SPAWN WATCHER</button>
                <button onclick="spawn('ITEM_CAMERA_HD')">SPAWN HD CAM</button>
                <button onclick="spawn('PROP_TNT')">SPAWN TNT</button>
                <button onclick="spawn('MONSTER_OGRE')">SPAWN OGRE</button>
            </div>

            <div class="log" id="log-console">> AWAITING COMMAND...</div>
        </div>
    </div>
</div>

<script>
    let selectedPlayer = null;

    // Linking Method Logic
    function startHandshake() {
        const code = document.getElementById('pairingCode').value;
        const msg = document.getElementById('link-msg');
        
        if (code.length === 6) {
            msg.innerText = "AUTHENTICATING WITH META SERVERS...";
            setTimeout(() => {
                msg.innerText = "LINK SUCCESSFUL. FETCHING LOBBY DATA...";
                setTimeout(() => {
                    document.getElementById('setup').style.display = 'none';
                    document.getElementById('main').style.display = 'flex';
                    fetchLiveLobby();
                }, 1500);
            }, 1500);
        } else {
            alert("INVALID PAIRING CODE");
        }
    }

    // Actual Username Simulation (Logic for API retrieval)
    function fetchLiveLobby() {
        const list = document.getElementById('player-list');
        // In a real APK, these would be pulled via Platform.Users.GetLoggedInUserFriends()
        const livePlayers = ["QuestMaster22", "Shadow_VR", "NutCollector", "CadetDuck", "Guest_4821"];
        
        livePlayers.forEach(p => {
            const div = document.createElement('div');
            div.className = 'player-entry';
            div.innerHTML = `<span>${p}</span><span style="font-size:9px; color:#888;">[ID:${Math.floor(Math.random()*9999)}]</span>`;
            div.onclick = () => {
                document.querySelectorAll('.player-entry').forEach(e => e.classList.remove('active'));
                div.classList.add('active');
                selectedPlayer = p;
                document.getElementById('target-label').innerText = `TARGET: ${p}`;
            };
            list.appendChild(div);
        });
        addLog("LOBBY DATA SYNCHRONIZED.");
    }

    function cmd(action) {
        if(!selectedPlayer) return alert("NO TARGET SELECTED");
        addLog(`EXECUTING ${action} ON ${selectedPlayer}...`);
        // Logic: Send packet to game engine to trigger state change
        setTimeout(() => addLog(`STATUS: ${action} SUCCESSFUL`), 800);
    }

    function spawn(prefab) {
        const loc = selectedPlayer ? selectedPlayer : "LOCAL_POS";
        addLog(`SPAWNING ${prefab} AT ${loc}`);
    }

    function addLog(m) {
        const l = document.getElementById('log-console');
        l.innerHTML += `<br>> ${m}`;
        l.scrollTop = l.scrollHeight;
    }
</script>

</body>
</html>
